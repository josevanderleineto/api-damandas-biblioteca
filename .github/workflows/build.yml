name: Desktop Build + Release

on:
  push:
    branches:
      - main

jobs:
  build-win:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      # Peg the repo and enable GitHub Action helpers
      - uses: actions/checkout@v4

      # Prepare Node.js (Electron Builder works best with recent LTS)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies and build the Windows NSIS installer
      - run: |
          npm ci
          npm run desktop:build:win
        shell: bash

      # Collect the installer(s) to pass to the release job
      - run: mkdir -p artifacts/windows
      - run: |
          cp dist-desktop/*.exe artifacts/windows/ || true
          cp dist-desktop/*.nsis.* artifacts/windows/ || true
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows/**

  build-mac:
    name: Build macOS installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: |
          npm ci
          npm run desktop:build:mac
        shell: bash

      - run: mkdir -p artifacts/macos
      - run: |
          cp dist-desktop/*.dmg artifacts/macos/ || true
          cp dist-desktop/*.pkg artifacts/macos/ || true
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: artifacts/macos/**

  publish-release:
    name: Publish installers to Releases
    runs-on: ubuntu-latest
    needs:
      - build-win
      - build-mac
    steps:
      - uses: actions/checkout@v4

      # Download the installers produced in the build jobs
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/windows
      - uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release-assets/macos

      - run: |
          mkdir -p release-assets/combined
          cp release-assets/windows/* release-assets/combined/ || true
          cp release-assets/macos/* release-assets/combined/ || true
        shell: bash

      # Create or update a GitHub Release with the binaries
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "electron-build-${{ github.run_number }}"
          name: "Sistema de Demandas (Biblioteca) installer ${{ github.run_number }}"
          files: |
            release-assets/combined/**
          body: |
            Build automático do Electron na branch main.
            Instalações disponíveis nos anexos deste release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
